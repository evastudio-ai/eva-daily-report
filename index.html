<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVA日报</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;
    background:#f6f6f6;
    color:#222;
}

.container{
    max-width:720px;
    margin:20px auto;
    padding:16px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

h1{
    font-size:18px;
    margin:0 0 10px 0;
    text-align:center;
}

.section{
    margin-top:12px;
}

.title{
    font-size:14px;
    font-weight:600;
    margin-bottom:6px;
    color:#444;
}

.row{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    padding:4px 0;
}

.label{
    color:#666;
}

.value{
    color:#111;
    font-weight:500;
}

hr{
    border:none;
    border-top:1px solid #eee;
    margin:10px 0;
}

textarea,input{
    width:100%;
    padding:8px;
    margin-top:4px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:14px;
}

.primary{
    background:#222;
    color:#fff;
}

.secondary{
    background:#eee;
}

.small{
    font-size:12px;
    color:#888;
    margin-top:6px;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>EVA DAILY REPORT</h1>

<div class="section">
<div class="title">基础信息</div>
<input placeholder="日期">
<input placeholder="门店">
<input placeholder="营业员">
</div>

<hr>

<div class="section">
<div class="title">流量数据</div>
<div class="row"><span class="label">来客</span><span class="value">0</span></div>
<div class="row"><span class="label">试穿</span><span class="value">0</span></div>
<div class="row"><span class="label">成交</span><span class="value">0</span></div>
</div>

<hr>

<div class="section">
<div class="title">销售数据</div>
<div class="row"><span class="label">营业额</span><span class="value">0</span></div>
<div class="row"><span class="label">目标</span><span class="value">0</span></div>
</div>

<hr>

<div class="section">
<div class="title">客户结构</div>
<div class="row"><span class="label">新客</span><span class="value">0</span></div>
<div class="row"><span class="label">老客</span><span class="value">0</span></div>
</div>

<hr>

<div class="section">
<div class="title">收款结构</div>
<div class="row"><span class="label">支付宝</span><span class="value">0</span></div>
<div class="row"><span class="label">银行卡</span><span class="value">0</span></div>
</div>

<hr>

<div class="section">
<div class="title">重点 / 问题</div>
<textarea rows="3" placeholder="填写今日重点问题"></textarea>
</div>

<div class="section">
<div class="title">明日计划</div>
<textarea rows="3" placeholder="≤3条"></textarea>
</div>

<button class="primary">生成日报</button>
<button class="secondary">清空</button>

<div class="small">EVA SYSTEM V1.1</div>

</div>
</div>

</body>
</html>
