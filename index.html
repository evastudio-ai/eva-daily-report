<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVA 日报生成器</title>
    <style>
        body { font-family: sans-serif; background: #f8f7fa; margin: 0; padding: 5px; font-size: 13px; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; padding: 10px; border-radius: 8px; }
        .header { background: #7c3aed; color: white; padding: 8px; text-align: center; border-radius: 6px; margin-bottom: 8px; }
        .section { border: 1px solid #eee; padding: 8px; border-radius: 6px; margin-bottom: 8px; }
        .section-title { color: #7c3aed; font-weight: bold; margin-bottom: 5px; font-size: 12px; }
        .flex { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
        input[type="number"], select { width: 45px; padding: 3px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
        .w-long { width: 70px !important; }
        textarea { width: 100%; border: 1px solid #ccc; border-radius: 3px; padding: 5px; box-sizing: border-box; resize: none; }
        .btn { width: 100%; padding: 8px; border: none; border-radius: 4px; color: white; font-weight: bold; margin-bottom: 5px; cursor: pointer; }
        .btn-g { background: #7c3aed; } .btn-c { background: #a855f7; } .btn-r { background: #e5e0ea; color: #555; }
        #previewBox { background: #f3f0f7; padding: 8px; border-radius: 4px; white-space: pre-wrap; font-size: 12px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">EVA STUDIO 日报系统</div>
        <div class="section">
            <div class="flex">
                <select id="store"><option>崇宁路店</option><option>永丰路店</option></select>
                <select id="weather"><option>晴天</option><option>阴天</option><option>雨天</option></select>
                <select id="sA"><option>A班:无</option><option>A:楠楠</option><option>A:萍萍</option><option>A:丽丽</option></select>
                <select id="sB"><option>B班:无</option><option>B:楠楠</option><option>B:萍萍</option><option>B:丽丽</option></select>
            </div>
        </div>
        <div class="section">
            <div class="section-title">本月大盘进度</div>
            <div class="flex">目标:<input type="number" id="mTar" class="w-long"> 累计:<input type="number" id="mBeg" class="w-long"></div>
        </div>
        <div class="section">
            <div class="section-title">营收与收款数据</div>
            <div class="flex">额度:<input type="number" id="rev" class="w-long"> 目标:<input type="number" id="tar" class="w-long"></div>
            <div class="flex" style="color: #7c3aed; font-size: 11px;">(微信/支/银/现):</div>
            <div class="flex"><input type="number" id="pW"><input type="number" id="pZ"><input type="number" id="pY"><input type="number" id="pX"></div>
        </div>
        <div class="section">
            <div class="section-title">进店与成交</div>
            <div class="flex">新:<input type="number" id="nC"> 老:<input type="number" id="oC"> 新试:<input type="number" id="nT"> 老试:<input type="number" id="oT"></div>
            <div class="flex">成交: 新<input type="number" id="ndP">人<input type="number" id="ndI">件|老<input type="number" id="odP">人<input type="number" id="odI">件|线<input type="number" id="onP">人<input type="number" id="onI">件</div>
        </div>
        <div class="section">
            <div class="section-title">私域与改衣</div>
            <div class="flex">微:<input type="number" id="prW"> 红:<input type="number" id="prX"> 抖:<input type="number" id="prD"> 改衣:<input type="number" id="alt"></div>
        </div>
        <textarea id="cust" placeholder="客户情况..." rows="2"></textarea>
        <textarea id="hand" placeholder="交接事项..." rows="2"></textarea>
        <select id="rep" style="width:100%; margin-top:5px;"><option>楠楠</option><option>萍萍</option><option>丽丽</option><option>EVA</option></select>
        
        <button class="btn btn-g" id="gen">生成预览</button>
        <button class="btn btn-c" id="copy">一键复制</button>
        <button class="btn btn-r" id="res">清空</button>
        <div id="previewBox"></div>
    </div>

    <script>
        const val = id => Number(document.getElementById(id).value || 0);
        function validate() {
            const rev = val('rev');
            const totalPay = val('pW') + val('pZ') + val('pY') + val('pX');
            if (rev !== totalPay) {
                alert(`数据错误！\n营业额(${rev}) 不等于 收款总和(${totalPay})。\n请核对收款数据后再提交！`);
                return false;
            }
            return true;
        }

        function make() {
            const d = new Date(), store = document.getElementById('store').value;
            const icon = store === '崇宁路店' ? '❤️' : '💛';
            const [nC, oC, nT, oT, ndP, ndI, odP, odI, onP, onI, rev, mTar, mBeg] = ['nC', 'oC', 'nT', 'oT', 'ndP', 'ndI', 'odP', 'odI', 'onP', 'onI', 'rev', 'mTar', 'mBeg'].map(val);
            const totalDealP = ndP + odP + onP, totalDealI = ndI + odI + onI;
            const cr = (nC + oC) > 0 ? Math.round(((ndP + odP) / (nC + oC)) * 100) : 0;
            const upt = totalDealP > 0 ? (totalDealI / totalDealP).toFixed(1) : 0;
            const atp = totalDealP > 0 ? Math.round(rev / totalDealP) : 0;
            
            return `${icon} EVA【${store}】日报
日期：${d.getMonth()+1}/${d.getDate()} 天气：${document.getElementById('weather').value}

📊【本月经营大盘进度】
月度目标：${mTar} | 累计完成：${mBeg + rev}
业绩完成率：${mTar>0 ? ((mBeg+rev)/mTar*100).toFixed(2) : 0}%

【班次】${document.getElementById('sA').value} ${document.getElementById('sB').value}
【今日营业额】${rev} (目标:${val('tar')})
【收款】微信${val('pW')}|支${val('pZ')}|银${val('pY')}|现${val('pX')}
【来客】新${nC} 老${oC} 共${nC+oC}人
【试穿】新${nT} 老${oT} 共${nT+oT}人
【成交】新${ndP}人${ndI}件|老${odP}人${odI}件|线上${onP}人${onI}件
【分析】CR ${cr}% | UPT ${upt} | ATP ${atp}元
        新客率${nC>0?Math.round(ndP/nC*100):0}%|老客率${oC>0?Math.round(odP/oC*100):0}%
【新】微${val('prW')}人|红${val('prX')}人|抖${val('prD')}人
【改衣】${val('alt')}件

【今日客户情况】
${document.getElementById('cust').value}

【交接事项】
${document.getElementById('hand').value}

【填表人】${document.getElementById('rep').value}`;
        }

        document.getElementById('gen').onclick = () => { 
            if(!validate()) return;
            document.getElementById('previewBox').innerText = make(); 
            document.getElementById('previewBox').style.display = 'block'; 
        };
        document.getElementById('copy').onclick = () => { 
            if(!validate()) return;
            navigator.clipboard.writeText(make()).then(() => alert('已复制！')); 
        };
        document.getElementById('res').onclick = () => location.reload();
    </script>
</body>
</html>
