<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVA日报 V2.1</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:#f5f5f5;
    color:#222;
}

.container{
    max-width:720px;
    margin:20px auto;
    padding:14px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:16px;
}

h1{
    text-align:center;
    font-size:18px;
    margin-bottom:10px;
}

.section{
    margin-top:12px;
}

label{
    font-size:13px;
    color:#444;
}

input,select{
    width:100%;
    padding:8px;
    margin-top:4px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}

.row{
    display:flex;
    gap:8px;
}

.row div{
    flex:1;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

.primary{background:#111;color:#fff;}
.secondary{background:#eee;}

.output{
    margin-top:10px;
    padding:12px;
    background:#fafafa;
    border-radius:10px;
    white-space:pre-wrap;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>💜 EVA日报 V2.1</h1>

<div class="section">
<label>门店</label>
<select id="store">
<option>崇宁路店</option>
<option>永丰路店</option>
</select>

<label>人员</label>
<input id="staff" placeholder="当班人员">

<label>日期</label>
<input id="date" readonly>
</div>

<div class="section">
<label>流量</label>
<div class="row">
<input id="c" type="number" placeholder="来客">
<input id="t" type="number" placeholder="试穿">
<input id="s" type="number" placeholder="成交">
</div>
</div>

<div class="section">
<label>销售</label>
<div class="row">
<input id="r" type="number" placeholder="营业额">
<input id="g" type="number" placeholder="目标">
</div>
</div>

<div class="section">
<label>客户</label>
<div class="row">
<input id="n" type="number" placeholder="新客">
<input id="o" type="number" placeholder="老客">
</div>
</div>

<button class="primary" onclick="gen()">生成日报</button>
<button class="secondary" onclick="copy()">复制微信</button>

<div class="output" id="out"></div>

</div>
</div>

<script>

document.getElementById("date").value =
new Date().toISOString().split("T")[0];

function v(id){
return Number(document.getElementById(id).value || 0);
}

function gen(){

let c=v("c"), t=v("t"), s=v("s");
let r=v("r"), g=v("g");
let n=v("n"), o=v("o");

let store=document.getElementById("store").value;
let staff=document.getElementById("staff").value;
let date=document.getElementById("date").value;

let cr = c? (s/c*100).toFixed(1):0;
let tr = c? (t/c*100).toFixed(1):0;
let rate = g? (r/g*100).toFixed(1):0;

let text =
`💜 EVA日报｜${store}｜${staff}｜${date}

流量：来客${c}｜试穿${t}｜成交${s}
销售：${r}｜目标${g}｜达成${rate}%

指标：CR${cr}%｜试穿率${tr}%

客户：新${n}｜老${o}`;

document.getElementById("out").innerText = text;
}

function copy(){
let txt=document.getElementById("out").innerText;
navigator.clipboard.writeText(txt||"");
alert("已复制");
}

</script>

</body>
</html>
