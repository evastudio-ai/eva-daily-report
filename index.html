<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVA STUDIO 日报系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f9; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .card-title { font-weight: bold; color: #7c3aed; margin-bottom: 12px; border-left: 4px solid #7c3aed; padding-left: 8px; display: flex; align-items: center; }
        .row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
        .label { min-width: 70px; font-size: 14px; color: #666; }
        input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
        input:disabled { background: #f9f9f9; }
        .unit { min-width: 20px; font-size: 13px; color: #999; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; }
        .gen { background: #7c3aed; } .copy { background: #a855f7; }
        #preview { background: #fff; border: 1px dashed #7c3aed; padding: 15px; border-radius: 8px; display: none; margin-top: 15px; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-title">本月大盘进度 (自动记忆)</div>
        <div class="row"><div class="label">月目标</div><input type="number" id="mTar"><div class="unit">元</div></div>
        <div class="row"><div class="label">历史累计</div><input type="number" id="mBeg"><div class="unit">元</div></div>
    </div>

    <div class="card">
        <div class="card-title">今日营业额度</div>
        <div class="row"><div class="label">今日目标</div><input type="number" id="tarAuto" disabled><div class="unit">元</div></div>
        <div class="row"><div class="label">今日额度</div><input type="number" id="rev"><div class="unit">元</div></div>
    </div>

    <div class="card">
        <div class="card-title">进店与试穿数据</div>
        <div class="row">新客<input type="number" id="nC">人 | 老客<input type="number" id="oC">人</div>
        <div class="row">新试<input type="number" id="nT">人 | 老试<input type="number" id="oT">人</div>
    </div>

    <div class="card">
        <div class="card-title">成交情况</div>
        <div class="row">新成交<input type="number" id="ndP">人<input type="number" id="ndI">件</div>
        <div class="row">老成交<input type="number" id="odP">人<input type="number" id="odI">件</div>
        <div class="row">线上<input type="number" id="onP">人<input type="number" id="onI">件</div>
    </div>

    <textarea id="note" placeholder="客户情况与交接事项..." rows="3"></textarea>
    <div class="btn-group" style="margin-top:15px;">
        <button class="btn gen" onclick="gen()">生成预览</button>
        <button class="btn copy" onclick="copy()">一键复制</button>
    </div>
    <div id="preview"></div>
</div>

<script>
    const v = id => Number(document.getElementById(id).value || 0);
    // 自动平摊逻辑
    document.querySelectorAll('input').forEach(i => i.oninput = () => {
        const remaining = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate() - new Date().getDate() + 1;
        document.getElementById('tarAuto').value = Math.round((v('mTar') - v('mBeg')) / remaining);
    });

    function gen() {
        const text = `今日营收：${v('rev')}元 (目标:${document.getElementById('tarAuto').value})\n进店：新${v('nC')}/老${v('oC')}\n成交：新${v('ndP')}人${v('ndI')}件\n备注：${document.getElementById('note').value}`;
        const p = document.getElementById('preview');
        p.innerText = text; p.style.display = 'block';
    }
    const copy = () => navigator.clipboard.writeText(document.getElementById('preview').innerText).then(() => alert('已复制'));
</script>
</body>
</html>
