<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVA日报 V2</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#f6f6f6;
    color:#222;
}

.container{
    max-width:720px;
    margin:20px auto;
    padding:16px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:16px;
}

h1{
    font-size:18px;
    text-align:center;
    margin-bottom:10px;
}

.section{
    margin-top:12px;
}

.title{
    font-size:14px;
    font-weight:600;
    margin-bottom:6px;
    color:#333;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:4px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}

.row{
    display:flex;
    gap:10px;
}

.row div{
    flex:1;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:14px;
}

.primary{
    background:#111;
    color:#fff;
}

.secondary{
    background:#eee;
}

.output{
    white-space:pre-wrap;
    background:#fafafa;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>💜 EVA日报 V2</h1>

<!-- 基础 -->
<div class="section">
<div class="title">基础信息</div>

<label>门店</label>
<select id="store">
    <option>崇宁路店</option>
    <option>永丰路店</option>
</select>

<label>人员</label>
<input id="staff" placeholder="当班人员">

<label>日期（自动）</label>
<input id="date" readonly>
</div>

<!-- 流量 -->
<div class="section">
<div class="title">流量数据</div>

<div class="row">
<div>
<label>来客</label>
<input type="number" id="c">
</div>
<div>
<label>试穿</label>
<input type="number" id="t">
</div>
<div>
<label>成交</label>
<input type="number" id="s">
</div>
</div>
</div>

<!-- 销售 -->
<div class="section">
<div class="title">销售数据</div>

<div class="row">
<div>
<label>营业额</label>
<input type="number" id="r">
</div>
<div>
<label>目标</label>
<input type="number" id="g">
</div>
</div>
</div>

<!-- 客户 -->
<div class="section">
<div class="title">客户结构</div>

<div class="row">
<div>
<label>新客</label>
<input type="number" id="n">
</div>
<div>
<label>老客</label>
<input type="number" id="o">
</div>
</div>
</div>

<button class="primary" onclick="gen()">生成日报</button>
<button class="secondary" onclick="copy()">复制微信</button>

<div class="output" id="out"></div>

</div>
</div>

<script>

// 自动日期
document.getElementById("date").value =
new Date().toISOString().split("T")[0];

function safe(v){ return isNaN(+v)?0:+v }

function gen(){

let c = safe(c.value);
let t = safe(t.value);
let s = safe(s.value);
let r = safe(r.value);
let g = safe(g.value);

let cr = c ? (s/c*100).toFixed(1) : 0;
let tr = c ? (t/c*100).toFixed(1) : 0;
let rate = g ? (r/g*100).toFixed(1) : 0;

let status = "未达标";
if(rate >= 100) status="超额完成";
else if(rate >= 80) status="接近目标";

let text =
`💜 EVA日报｜${store.value}｜${staff.value}｜${date.value}

流量：来客${c}｜试穿${t}｜成交${s}
销售：${r}｜目标${g}｜达成${rate}%

指标：CR${cr}%｜试穿率${tr}%

客户：新${n.value||0}｜老${o.value||0}

状态：${status}`;

out.innerText = text;
}

function copy(){
navigator.clipboard.writeText(out.innerText);
alert("已复制");
}

</script>

</body>
</html>
