<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVA STUDIO 日报生成器</title>
    <script src="https://cdn.staticfile.org/react/17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.org/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.org/babel-standalone/7.22.20/babel.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f8f7fa; color: #333; -webkit-font-smoothing: antialiased;
        }
        .app { max-width: 430px; margin: 0 auto; padding: 0 0 20px; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%); padding: 32px 20px 24px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .brand-name { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 4px; }
        .brand-sub { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 4px; letter-spacing: 2px; }
        .card { background: #fff; margin: 12px 12px 0; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .card-title { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 12px; }
        .dashboard-card { background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%); }
        .dashboard-placeholder { text-align: center; color: #a78bfa; font-size: 13px; padding: 12px 0; }
        .field-row { margin-bottom: 12px; }
        .field-row label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
        .segment-group { display: flex; gap: 6px; }
        .segment-btn { flex: 1; padding: 8px 4px; border: 1.5px solid #e5e0ea; border-radius: 8px; background: #fff; font-size: 12px; color: #666; cursor: pointer; transition: all 0.2s; }
        .segment-btn.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
        .staff-section { display: flex; gap: 10px; margin-top: 8px; }
        .staff-row { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .shift-label { font-size: 12px; font-weight: 600; color: #7c3aed; }
        .staff-row select { width: 100%; padding: 7px 4px; border: 1.5px solid #e5e0ea; border-radius: 8px; font-size: 12px; color: #444; background: #faf9fb; text-align: center; outline: none; }
        .number-input { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .number-input label { font-size: 12px; color: #888; }
        .input-with-unit { position: relative; width: 100%; display: flex; align-items: center; }
        .input-with-unit input { width: 100%; padding: 8px 24px 8px 8px; border: 1.5px solid #e5e0ea; border-radius: 8px; font-size: 14px; text-align: center; color: #333; background: #faf9fb; outline: none; }
        .input-with-unit input:focus { border-color: #a855f7; }
        .input-with-unit .unit { position: absolute; right: 8px; font-size: 11px; color: #bbb; pointer-events: none; }
        .data-grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .deal-section { display: flex; flex-direction: column; gap: 10px; }
        .deal-row { display: flex; align-items: center; gap: 8px; background: #faf9fb; padding: 8px 12px; border-radius: 8px; }
        .deal-label { font-size: 13px; font-weight: 500; color: #555; width: 36px; flex-shrink: 0; }
        .deal-row input { flex: 1; max-width: 80px; padding: 6px; border: 1.5px solid #e5e0ea; border-radius: 6px; font-size: 13px; text-align: center; color: #333; outline: none; }
        .deal-row input:focus { border-color: #a855f7; }
        .unit { font-size: 12px; color: #aaa; flex-shrink: 0; }
        .revenue-input { display: flex; align-items: center; gap: 8px; }
        .revenue-input input { flex: 1; padding: 10px 12px; border: 1.5px solid #e5e0ea; border-radius: 8px; font-size: 16px; font-weight: 600; text-align: center; color: #333; background: #faf9fb; outline: none; }
        .revenue-input input:focus { border-color: #a855f7; }
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .payment-item { display: flex; align-items: center; gap: 4px; background: #faf9fb; padding: 8px; border-radius: 8px; }
        .payment-item label { font-size: 12px; color: #666; min-width: 42px; }
        .payment-item input { flex: 1; width: 100%; min-width: 40px; padding: 6px 4px; border: 1.5px solid #e5e0ea; border-radius: 6px; font-size: 13px; text-align: center; color: #333; outline: none; }
        .payment-item input:focus { border-color: #a855f7; }
        .private-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .private-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: #faf9fb; padding: 10px 6px; border-radius: 8px; }
        .private-item label { font-size: 12px; color: #666; }
        .private-item input { width: 100%; padding: 6px 2px; border: 1.5px solid #e5e0ea; border-radius: 6px; font-size: 13px; text-align: center; color: #333; outline: none; }
        .private-item input:focus { border-color: #a855f7; }
        .card textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e0ea; border-radius: 8px; font-size: 13px; color: #333; background: #faf9fb; resize: none; line-height: 1.6; font-family: inherit; outline: none; }
        .card textarea:focus { border-color: #a855f7; }
        .action-section { display: flex; gap: 10px; margin: 16px 12px 0; }
        .btn-copy { flex: 2; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s ease, opacity 0.2s; }
        .btn-copy:active { transform: scale(0.98); opacity: 0.9; }
        .btn-reset { flex: 1; padding: 14px; border: 1.5px solid #e5e0ea; border-radius: 12px; background: #fff; color: #888; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-reset:active { background: #f5f3f7; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #ccc; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const STORES = ['崇宁路店', '永丰路店'];
        const WEATHERS = ['晴天', '阴天', '雨天'];
        const STAFF_OPTIONS = ['无', '楠楠', '萍萍', '丽丽', 'EVA'];
        const PAYMENT_TYPES = ['微信', '支付宝', '银行卡', '现金', '卡消', '充值', '退单', '赠品'];
        const PRIVATE_DOMAIN = ['微信', '小红书', '抖音'];

        function NumberInput({ value, onChange, label, unit = "人" }) {
            return (
                <div className="number-input">
                    <label>{label}</label>
                    <div className="input-with-unit">
                        <input
                            type="number"
                            value={value}
                            onChange={(e) => onChange(e.target.value)}
                            min="0"
                            placeholder="0"
                        />
                        <span className="unit">{unit}</span>
                    </div>
                </div>
            )
        }

        function SegmentButton({ options, value, onChange }) {
            return (
                <div className="segment-group">
                    {options.map((opt) => (
                        <button
                            key={opt}
                            type="button"
                            className={`segment-btn ${value === opt ? 'active' : ''}`}
                            onClick={() => onChange(opt)}
                        >
                            {opt}
                        </button>
                    ))}
                </div>
            )
        }

        function StaffSelect({ value, onChange, shiftLabel }) {
            return (
                <div className="staff-row">
                    <span className="shift-label">{shiftLabel}</span>
                    <select value={value} onChange={(e) => onChange(e.target.value)}>
                        {STAFF_OPTIONS.map((opt) => (
                            <option key={opt} value={opt}>{opt}</option>
                        ))}
                    </select>
                </div>
            )
        }

        function App() {
            const [store, setStore] = useState('崇宁路店');
            const [weather, setWeather] = useState('晴天');
            const [shiftA, setShiftA] = useState('无');
            const [shiftB, setShiftB] = useState('无');
            const [shiftC, setShiftC] = useState('无');

            const [newCustomers, setNewCustomers] = useState('');
            const [newTryOn, setNewTryOn] = useState('');
            const [oldCustomers, setOldCustomers] = useState('');
            const [oldTryOn, setOldTryOn] = useState('');

            const [newDealPeople, setNewDealPeople] = useState('');
            const [newDealItems, setNewDealItems] = useState('');
            const [oldDealPeople, setOldDealPeople] = useState('');
            const [oldDealItems, setOldDealItems] = useState('');
            const [onlineDealPeople, setOnlineDealPeople] = useState('');
            const [onlineDealItems, setOnlineDealItems] = useState('');

            const [revenue, setRevenue] = useState('');

            const [payments, setPayments] = useState({
                '微信': '', '支付宝': '', '银行卡': '', '现金': '',
                '卡消': '', '充值': '', '退单': '', '赠品': '',
            });

            const [privateDomain, setPrivateDomain] = useState({
                '微信': '', '小红书': '', '抖音': '',
            });

            const [customerDetails, setCustomerDetails] = useState('');
            const [handover, setHandover] = useState('');
            const [reporter, setReporter] = useState('楠楠');

            const today = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });

            const formatNum = (val) => (val === '' ? 0 : Number(val));

            const generateReport = () => {
                const lines = [
                    `💜 EVA【${store}】日报`,
                    `日期：${today}`,
                    `天气：${weather}`,
                    '',
                    `【班次】`,
                    `A班：${shiftA}`,
                    `B班：${shiftB}`,
                    `C班：${shiftC}`,
                    '',
                    `【进店数据】`,
                    `新客：${formatNum(newCustomers)}人（试穿${formatNum(newTryOn)}人）`,
                    `老客：${formatNum(oldCustomers)}人（试穿${formatNum(oldTryOn)}人）`,
                    '',
                    `【成交数据】`,
                    `新客：${formatNum(newDealPeople)}人${formatNum(newDealItems)}件`,
                    `老客：${formatNum(oldDealPeople)}人${formatNum(oldDealItems)}件`,
                    `线上：${formatNum(onlineDealPeople)}人${formatNum(onlineDealItems)}件`,
                    '',
                    `【营业额】${formatNum(revenue)}元`,
                    '',
                    `【收款数据】`,
                    ...PAYMENT_TYPES.map(t => `${t}：${formatNum(payments[t])}元`),
                    '',
                    `【私域数据】`,
                    ...PRIVATE_DOMAIN.map(t => `${t}：${formatNum(privateDomain[t])}人`),
                    '',
                    `【今日客户情况】`,
                    customerDetails.trim() || '无',
                    '',
                    `【交接事项】`,
                    handover.trim() || '无',
                    '',
                    `填表人：${reporter}`,
                ];
                return lines.join('\n');
            };

            const copyReport = async () => {
                const text = generateReport();
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                        alert('🎉 日报已复制，请直接粘贴发送至微信群！');
                    } else {
                        throw new Error('Fallback');
                    }
                } catch {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'absolute';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    alert('🎉 日报已复制，请直接粘贴发送至微信群！');
                }
            };

            const resetAll = () => {
                if (!confirm('确定清空所有数据重新填写吗？')) return;
                setStore('崇宁路店'); setWeather('晴天');
                setShiftA('无'); setShiftB('无'); setShiftC('无');
                setNewCustomers(''); setNewTryOn(''); setOldCustomers(''); setOldTryOn('');
                setNewDealPeople(''); setNewDealItems(''); setOldDealPeople(''); setOldDealItems('');
                setOnlineDealPeople(''); setOnlineDealItems(''); setRevenue('');
                setPayments({ '微信': '', '支付宝': '', '银行卡': '', '现金': '', '卡消': '', '充值': '', '退单': '', '赠品': '' });
                setPrivateDomain({ '微信': '', '小红书': '', '抖音': '' });
                setCustomerDetails(''); setHandover('');
            };

            return (
                <div className="app">
                    <div className="header">
                        <div className="brand-name">EVA STUDIO</div>
                        <div className="brand-sub">日报生成器</div>
                    </div>

                    <div className="card dashboard-card">
                        <div className="card-title">🎯 本月经营看板</div>
                        <div className="dashboard-placeholder">本月目标未设置</div>
                    </div>

                    <div className="card">
                        <div className="card-title">基础信息</div>
                        <div className="field-row">
                            <label>门店</label>
                            <SegmentButton options={STORES} value={store} onChange={setStore} />
                        </div>
                        <div className="field-row">
                            <label>天气</label>
                            <SegmentButton options={WEATHERS} value={weather} onChange={setWeather} />
                        </div>
                        <div className="staff-section">
                            <StaffSelect value={shiftA} onChange={setShiftA} shiftLabel="A班" />
                            <StaffSelect value={shiftB} onChange={setShiftB} shiftLabel="B班" />
                            <StaffSelect value={shiftC} onChange={setShiftC} shiftLabel="C班" />
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">进店数据</div>
                        <div className="data-grid-2x2">
                            <NumberInput value={newCustomers} onChange={setNewCustomers} label="新客" />
                            <NumberInput value={newTryOn} onChange={setNewTryOn} label="新客试穿" />
                            <NumberInput value={oldCustomers} onChange={setOldCustomers} label="老客" />
                            <NumberInput value={oldTryOn} onChange={setOldTryOn} label="老客试穿" />
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">成交数据</div>
                        <div className="deal-section">
                            <div className="deal-row">
                                <span className="deal-label">新客</span>
                                <input type="number" value={newDealPeople} onChange={e => setNewDealPeople(e.target.value)} min="0" placeholder="0" />
                                <span className="unit">人</span>
                                <input type="number" value={newDealItems} onChange={e => setNewDealItems(e.target.value)} min="0" placeholder="0" />
                                <span className="unit">件</span>
                            </div>
                            <div className="deal-row">
                                <span className="deal-label">老客</span>
                                <input type="number" value={oldDealPeople} onChange={e => setOldDealPeople(e.target.value)} min="0" placeholder="0" />
                                <span className="unit">人</span>
                                <input type="number" value={oldDealItems} onChange={e => setOldDealItems(e.target.value)} min="0" placeholder="0" />
                                <span className="unit">件</span>
                            </div>
                            <div className="deal-row">
                                <span className="deal-label">线上</span>
                                <input type="number" value={onlineDealPeople} onChange={e => setOnlineDealPeople(e.target.value)} min="0" placeholder="0" />
                                <span className="unit">人</span>
                                <input type="number" value={onlineDealItems} onChange={e => setOnlineDealItems(e.target.value)} min="0" placeholder="0" />
                                <span className="unit">件</span>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">营业额</div>
                        <div className="revenue-input">
                            <input type="number" value={revenue} onChange={e => setRevenue(e.target.value)} min="0" placeholder="0" />
                            <span className="unit">元</span>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">收款数据</div>
                        <div className="payment-grid">
                            {PAYMENT_TYPES.map(type => (
                                <div key={type} className="payment-item">
                                    <label>{type}</label>
                                    <input type="number" value={payments[type]} onChange={e => {
                                        const nextPayments = {...payments};
                                        nextPayments[type] = e.target.value;
                                        setPayments(nextPayments);
                                    }} min="0" placeholder="0" />
                                    <span className="unit">元</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">私域数据</div>
                        <div className="private-grid">
                            {PRIVATE_DOMAIN.map(type => (
                                <div key={type} className="private-item">
                                    <label>{type}</label>
                                    <input type="number" value={privateDomain[type]} onChange={e => {
                                        const nextDomain = {...privateDomain};
                                        nextDomain[type] = e.target.value;
                                        setPrivateDomain(nextDomain);
                                    }} min="0" placeholder="0" />
                                    <span className="unit">人</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">今日客户情况</div>
                        <textarea value={customerDetails} onChange={e => setCustomerDetails(e.target.value)} placeholder="施美女成交4件1037元&#10;王姐试穿风衣未成交&#10;陈总预定连衣裙1件" rows={4} />
                    </div>

                    <div className="card">
                        <div className="card-title">交接事项</div>
                        <textarea value={handover} onChange={e => setHandover(e.target.value)} placeholder="许蓉挂单未购买&#10;杨润短裙待跟进&#10;刘姐定金已收等待调货" rows={4} />
                    </div>

                    <div className="card">
                        <div className="card-title">填表人</div>
                        <SegmentButton options={['楠楠', '萍萍', '丽丽', 'EVA']} value={reporter} onChange={setReporter} />
                    </div>

                    <div className="action-section">
                        <button className="btn-copy" onClick={copyReport}>复制日报</button>
                        <button className="btn-reset" onClick={resetAll}>清空重填</button>
                    </div>

                    <div className="footer">
                        <span>EVA STUDIO © 20
