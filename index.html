<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVA日报 V1.2</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#f6f6f6;
    color:#222;
}

.container{
    max-width:720px;
    margin:20px auto;
    padding:16px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:16px;
}

h1{
    font-size:18px;
    text-align:center;
    margin-bottom:10px;
}

.section{
    margin-top:12px;
}

.title{
    font-size:14px;
    font-weight:600;
    margin-bottom:6px;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:4px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}

.row{
    display:flex;
    gap:10px;
}

.row > div{
    flex:1;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:14px;
}

.primary{
    background:#222;
    color:#fff;
}

.secondary{
    background:#eee;
}

.small{
    font-size:12px;
    color:#888;
    margin-top:8px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>EVA DAILY REPORT V1.2</h1>

<!-- 基础信息 -->
<div class="section">
<div class="title">基础信息</div>

<label>日期（自动）</label>
<input id="date" readonly>

<label>门店</label>
<select id="store">
    <option>崇宁路店</option>
    <option>永丰路店</option>
</select>

<label>当班人员</label>
<select id="staff">
    <option>楠楠</option>
    <option>萍萍</option>
</select>
</div>

<!-- 流量 -->
<div class="section">
<div class="title">流量数据</div>

<div class="row">
<div>
<label>来客</label>
<input type="number" id="customers">
</div>
<div>
<label>试穿</label>
<input type="number" id="tryons">
</div>
<div>
<label>成交</label>
<input type="number" id="sales">
</div>
</div>
</div>

<!-- 销售 -->
<div class="section">
<div class="title">销售数据</div>

<div class="row">
<div>
<label>营业额</label>
<input type="number" id="revenue">
</div>
<div>
<label>目标</label>
<input type="number" id="target">
</div>
</div>
</div>

<!-- 客户 -->
<div class="section">
<div class="title">客户结构</div>

<div class="row">
<div>
<label>新客</label>
<input type="number" id="newcust">
</div>
<div>
<label>老客</label>
<input type="number" id="oldcust">
</div>
</div>
</div>

<!-- 收款 -->
<div class="section">
<div class="title">收款结构</div>

<div class="row">
<div>
<label>支付宝</label>
<input type="number" id="alipay">
</div>
<div>
<label>银行卡</label>
<input type="number" id="bank">
</div>
</div>
</div>

<!-- 问题 -->
<div class="section">
<div class="title">重点 / 问题</div>
<textarea rows="3"></textarea>
</div>

<!-- 计划 -->
<div class="section">
<div class="title">明日计划（≤3）</div>
<textarea rows="3"></textarea>
</div>

<button class="primary" onclick="generate()">生成微信日报</button>
<button class="secondary" onclick="clearAll()">清空</button>

<div class="small">EVA SYSTEM V1.2</div>

</div>
</div>

<script>
// 自动日期
document.getElementById("date").value = new Date().toISOString().split("T")[0];

// 生成微信文本
function generate(){
    const text =
`💜 EVA日报

门店：${store.value}
人员：${staff.value}
日期：${date.value}

——流量——
来客：${customers.value || 0}
试穿：${tryons.value || 0}
成交：${sales.value || 0}

——销售——
营业额：${revenue.value || 0}
目标：${target.value || 0}

——客户——
新客：${newcust.value || 0}
老客：${oldcust.value || 0}

——收款——
支付宝：${alipay.value || 0}
银行卡：${bank.value || 0}
`;

    navigator.clipboard.writeText(text);
    alert("已复制微信日报");
}

// 清空
function clearAll(){
    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll("textarea").forEach(t=>t.value="");
}
</script>

</body>
</html>
